<!doctype html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Funding Bot Dashboard</title>

    <style>
        :root {
            --bg: #f5f5f7;
            --card: rgba(255,255,255,.86);
            --card2: #fff;
            --text: #1d1d1f;
            --muted: #6e6e73;
            --line: rgba(0,0,0,.08);
            --soft: rgba(120,120,128,.12);
            --blue: #007aff;
            --green: #34c759;
            --red: #ff3b30;
            --orange: #ff9500;
            --shadow: 0 18px 50px rgba(0,0,0,.08);
            --radius: 22px;
        }

        html[data-theme="dark"] {
            --bg: #0b0b0f;
            --card: rgba(28,28,30,.86);
            --card2: #1c1c1e;
            --text: #f5f5f7;
            --muted: #a1a1aa;
            --line: rgba(255,255,255,.10);
            --soft: rgba(120,120,128,.18);
            --shadow: 0 20px 70px rgba(0,0,0,.45);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Arial, sans-serif;
            background: radial-gradient(circle at top left, rgba(0,122,255,.10), transparent 34%), var(--bg);
            color: var(--text);
        }

        button,
        input,
        select {
            font: inherit;
        }

        .top {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(18px);
            background: color-mix(in srgb, var(--bg) 78%, transparent);
            border-bottom: 1px solid var(--line);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            max-width: 1560px;
            margin: 0 auto;
            padding: 16px 22px;
        }

        .brand {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .logo {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--blue), #6e5cff);
            box-shadow: 0 10px 22px rgba(0,122,255,.28);
        }

        h1 {
            font-size: 20px;
            margin: 0;
        }

        .subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-top: 2px;
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid var(--line);
            background: var(--card2);
            color: var(--text);
            padding: 9px 12px;
            border-radius: 13px;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(0,0,0,.04);
        }

        .btn:hover {
            border-color: rgba(0,122,255,.45);
        }

        .btn.primary {
            background: var(--blue);
            color: #fff;
            border-color: var(--blue);
        }

        .wrap {
            max-width: 1560px;
            margin: 0 auto;
            padding: 22px;
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr 2.3fr 1.2fr;
            gap: 14px;
            margin: 18px 0;
        }

        @media (max-width: 1100px) {
            .cards {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            backdrop-filter: blur(16px);
        }

        .label {
            font-size: 12px;
            color: var(--muted);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .04em;
        }

        .value {
            font-size: 24px;
            font-weight: 900;
            margin-top: 8px;
        }

        .small {
            font-size: 12px;
            color: var(--muted);
            margin-top: 6px;
        }

        .exchange-grid {
            display: grid;
            grid-template-columns: repeat(9, minmax(92px, 1fr));
            gap: 8px;
        }

        @media (max-width: 1220px) {
            .exchange-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .ex-mini {
            background: var(--soft);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 10px;
            min-height: 82px;
        }

        .ex-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .ex-name {
            font-size: 13px;
            font-weight: 900;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--muted);
            display: inline-block;
            flex: 0 0 auto;
        }

        .dot.ok {
            background: var(--green);
        }

        .dot.warn {
            background: var(--orange);
        }

        .dot.no {
            background: var(--red);
        }

        .ex-bal {
            font-size: 12px;
            color: var(--muted);
            margin-top: 8px;
        }

        .ex-bal strong {
            font-size: 13px;
            color: var(--text);
        }

        .ex-err {
            font-size: 10px;
            color: var(--red);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-top: 5px;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .timer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--soft);
            border-radius: 14px;
            padding: 9px 11px;
        }

        .timer-row span {
            font-size: 12px;
            color: var(--muted);
            font-weight: 900;
        }

        .timer-row strong {
            font-size: 17px;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }

        .tabs {
            display: flex;
            gap: 8px;
            overflow: auto;
            padding-bottom: 8px;
            scrollbar-width: thin;
        }

        .tab {
            white-space: nowrap;
            border: 1px solid var(--line);
            background: var(--card);
            color: var(--text);
            padding: 10px 13px;
            border-radius: 999px;
            cursor: pointer;
        }

        .tab.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        .section {
            display: none;
            margin-top: 12px;
        }

        .section.active {
            display: block;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 14px 0;
            flex-wrap: wrap;
        }

        .toolbar h2 {
            margin: 0;
            font-size: 22px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .control {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 8px 10px;
            display: flex;
            gap: 8px;
            align-items: center;
            color: var(--muted);
            font-size: 13px;
        }

        .control input,
        .control select {
            width: 90px;
            border: 0;
            background: transparent;
            color: var(--text);
            outline: none;
            font-weight: 800;
        }

        .control input[type="search"] {
            width: 190px;
        }

        .tableWrap {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: auto;
            width: 100%;
        }

        table {
            width: 100%;
            min-width: 1160px;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th,
        td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            font-size: 13px;
            vertical-align: middle;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        th {
            position: sticky;
            top: 0;
            background: var(--card2);
            z-index: 2;
            color: var(--muted);
            font-weight: 900;
            cursor: pointer;
        }

        tbody tr:hover {
            background: var(--soft);
        }

        .selected-row {
            background: rgba(0,122,255,.08);
        }

        .sort {
            font-size: 10px;
            color: var(--muted);
            margin-left: 4px;
        }

        .col-star {
            width: 52px;
            text-align: center;
        }

        .col-symbol {
            width: 150px;
        }

        .col-price {
            width: 120px;
        }

        .col-funding {
            width: 130px;
        }

        .col-volume {
            width: 170px;
        }

        .col-edit {
            width: 160px;
        }

        .col-pass {
            width: 130px;
        }

        .col-updated {
            width: 110px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 48px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: .3px;
            line-height: 1;
        }

        .badge.ok {
            color: #0f7a3b;
            background: rgba(52,199,89,.16);
            border: 1px solid rgba(52,199,89,.35);
        }

        .badge.no {
            color: #b42318;
            background: rgba(255,59,48,.14);
            border: 1px solid rgba(255,59,48,.35);
        }

        .edit-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: flex-start;
            gap: 7px;
            max-width: 100%;
            min-width: 0;
            white-space: nowrap;
            vertical-align: middle;
        }

        .edit-value {
            display: inline-block;
            max-width: calc(100% - 30px);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        .edit-btn {
            flex: 0 0 auto;
            width: 22px;
            height: 22px;
            border: 0;
            border-radius: 8px;
            background: rgba(0,122,255,.12);
            color: var(--blue);
            cursor: pointer;
            font-size: 12px;
            line-height: 22px;
            padding: 0;
            text-align: center;
        }

        .edit-btn:hover {
            background: rgba(0,122,255,.20);
        }

        .empty {
            color: var(--muted);
            text-align: center;
            padding: 32px;
        }

        .logbox,
        pre {
            white-space: pre-wrap;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            color: var(--text);
            overflow: auto;
        }

        .muted {
            color: var(--muted);
        }
    </style>
</head>

<body>
<div class="top">
    <div class="header">
        <div class="brand">
            <div class="logo"></div>
            <div>
                <h1>Funding Bot</h1>
                <div class="subtitle">Mainnet-only · hybrid REST + WebSocket-ready · positive funding</div>
            </div>
        </div>

        <div class="actions">
            <button class="btn" id="themeBtn">🌙 Dark</button>
            <button class="btn" onclick="load()">↻ Refresh</button>
            <button class="btn primary" onclick="confirmCloseAll()">Close all</button>
        </div>
    </div>
</div>

<div class="wrap">
    <div class="cards">
        <div class="card">
            <div class="label">Bot Mode</div>
            <div class="value" id="mode">—</div>
            <div class="small" id="serverInfo">Status: loading</div>
        </div>

        <div class="card">
            <div class="label">Exchanges</div>
            <div class="exchange-grid" id="exchangeGrid"></div>
        </div>

        <div class="card">
            <div class="label">Funding Countdowns</div>
            <div class="timer-grid">
                <div class="timer-row">
                    <span>UTC+3</span>
                    <strong id="clockPlus3">--:--:--</strong>
                </div>
                <div class="timer-row">
                    <span>1h</span>
                    <strong id="cd1h">--:--:--</strong>
                </div>
                <div class="timer-row">
                    <span>4h</span>
                    <strong id="cd4h">--:--:--</strong>
                </div>
                <div class="timer-row">
                    <span>8h</span>
                    <strong id="cd8h">--:--:--</strong>
                </div>
            </div>
        </div>
    </div>

    <nav class="tabs" id="tabs"></nav>
    <div id="sections"></div>
</div>

<script>
    let state = null;
    let sortState = {};

    const baseCols = [
        ['selected', '★', 'col-star'],
        ['symbol', 'Symbol', 'col-symbol'],
        ['price', 'Price', 'col-price'],
        ['funding_display', 'Funding', 'col-funding'],
        ['volume_24h_usdt', '24h Volume', 'col-volume'],
        ['planned_entry', 'Planned Entry', 'col-edit'],
        ['safe_tp_price', 'Safe TP', 'col-edit'],
        ['pass_funding', 'Pass Funding', 'col-pass'],
        ['pass_volume', 'Pass Volume', 'col-pass'],
        ['updated_at', 'Updated', 'col-updated']
    ];

    function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"]/g, m => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;'
        }[m]));
    }

    function fmtNum(n, d = 2) {
        if (n === undefined || n === null || Number.isNaN(Number(n))) return '—';
        return Number(n).toLocaleString(undefined, { maximumFractionDigits: d });
    }

    function money(n) {
        return fmtNum(n, 2) + ' USDT';
    }

    function pct2(x) {
        const n = Number(x || 0) * 100;
        return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
    }

    function fmtPrice(n) {
        n = Number(n || 0);
        if (!n) return '—';
        if (n >= 100) return n.toFixed(2);
        if (n >= 1) return n.toFixed(4);
        return n.toFixed(8).replace(/0+$/, '').replace(/\.$/, '');
    }

    function pass(x) {
        return x
            ? '<span class="badge ok">YES</span>'
            : '<span class="badge no">NO</span>';
    }

    function fundingDisplay(r) {
        const h = Number(r.funding_interval_hours || 8);
        return pct2(r.funding_rate) + ' / ' + h.toFixed(0) + 'h';
    }

    function exchangeKey(name) {
        return String(name || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function exchanges() {
        return state?.exchanges || [];
    }

    function buildShell() {
        const tabs = document.getElementById('tabs');
        const sections = document.getElementById('sections');

        tabs.innerHTML = '';
        sections.innerHTML = '';

        const items = [
            ...exchanges().map(ex => ({
                key: exchangeKey(ex.name),
                label: ex.name + ' Futures',
                exchange: ex.name
            })),
            { key: 'active', label: 'Active Trades' },
            { key: 'journal', label: 'Trade Journal' },
            { key: 'settings', label: 'Settings / Info' },
            { key: 'logs', label: 'Logs' }
        ];

        items.forEach((e, i) => {
            if (!sortState[e.key]) {
                sortState[e.key] = { key: 'funding_rate', dir: -1 };
            }

            const b = document.createElement('button');
            b.className = 'tab' + (i === 0 ? ' active' : '');
            b.textContent = e.label;
            b.dataset.tab = e.key;
            b.onclick = () => showTab(e.key);
            tabs.appendChild(b);

            const sec = document.createElement('section');
            sec.className = 'section' + (i === 0 ? ' active' : '');
            sec.id = 'tab-' + e.key;

            if (e.exchange) {
                sec.innerHTML = exchangeSectionHtml(e);
            } else if (e.key === 'active') {
                sec.innerHTML = '<div class="toolbar"><h2>Active Trades</h2></div><div class="tableWrap"><table id="activeTable"></table></div>';
            } else if (e.key === 'journal') {
                sec.innerHTML = '<div class="toolbar"><h2>Trade Journal</h2></div><div class="tableWrap"><table id="journalTable"></table></div>';
            } else if (e.key === 'settings') {
                sec.innerHTML = '<div class="toolbar"><h2>Settings / Info</h2></div><pre id="settingsBox">Loading…</pre>';
            } else {
                sec.innerHTML = '<div class="toolbar"><h2>Logs</h2></div><div class="logbox" id="logsBox">Loading…</div>';
            }

            sections.appendChild(sec);
        });
    }

    function exchangeSectionHtml(e) {
        return `
        <div class="toolbar">
          <h2>${escapeHtml(e.label)}</h2>
          <div class="controls">
            <label class="control">
              Show rows
              <input id="${e.key}Rows" type="number" min="1" value="10">
            </label>
            <label class="control">
              Search
              <input id="${e.key}Search" type="search" placeholder="BTC, ETH…">
            </label>
            <label class="control">
              Filter
              <select id="${e.key}Filter">
                <option value="passed">Passed only</option>
                <option value="all">All</option>
                <option value="selected">Selected</option>
              </select>
            </label>
          </div>
        </div>
        <div class="tableWrap">
          <table id="${e.key}Table"></table>
        </div>
      `;
    }

    function showTab(key) {
        document.querySelectorAll('.tab').forEach(x => {
            x.classList.toggle('active', x.dataset.tab === key);
        });

        document.querySelectorAll('.section').forEach(x => {
            x.classList.toggle('active', x.id === 'tab-' + key);
        });
    }

    function renderExchangeGrid() {
        const grid = document.getElementById('exchangeGrid');

        grid.innerHTML = exchanges().map(ex => {
            const connected = !!ex.connected;
            const privateOK = !!ex.private_ok;
            const cls = connected ? (privateOK ? 'ok' : 'warn') : 'no';
            const bal = ex.balance || {};
            const balance = Number(bal.available_usdt || bal.wallet_usdt || 0);

            return `
          <div class="ex-mini" title="${escapeHtml(ex.error || '')}">
            <div class="ex-top">
              <span class="ex-name">${escapeHtml(ex.name)}</span>
              <span class="dot ${cls}"></span>
            </div>
            <div class="ex-bal">
              Balance<br>
              <strong>${Number.isFinite(balance) ? balance.toFixed(2) + ' USDT' : '—'}</strong>
            </div>
            ${ex.error ? `<div class="ex-err">${escapeHtml(ex.error)}</div>` : ''}
          </div>
        `;
        }).join('');
    }

    function val(row, key) {
        if (key === 'funding_display') return Number(row.funding_rate || 0);
        return row[key];
    }

    function renderCandidateTable(ex) {
        const key = exchangeKey(ex.name);
        const rows = ex.candidates || [];
        const table = document.getElementById(key + 'Table');

        if (!table) return;

        let limit = parseInt(document.getElementById(key + 'Rows')?.value || '10', 10);
        if (limit < 1) limit = 10;

        const q = String(document.getElementById(key + 'Search')?.value || '').trim().toUpperCase();
        const filter = document.getElementById(key + 'Filter')?.value || 'passed';
        const st = sortState[key] || { key: 'funding_rate', dir: -1 };

        let data = [...rows];

        if (q) {
            data = data.filter(r => String(r.symbol || '').toUpperCase().includes(q));
        }

        if (filter === 'passed') {
            data = data.filter(r =>
                r.pass_funding === true &&
                r.pass_volume === true &&
                r.pass_spread !== false
            );
        }

        if (filter === 'selected') {
            data = data.filter(r => r.selected === true);
        }

        data = data.sort((a, b) => {
            let av = val(a, st.key);
            let bv = val(b, st.key);

            if (typeof av === 'string') {
                return String(av).localeCompare(String(bv)) * st.dir;
            }

            return ((Number(av) || 0) - (Number(bv) || 0)) * st.dir;
        }).slice(0, limit);

        let html = '<thead><tr>' + baseCols.map(c => {
            return `
          <th class="${c[2]}" data-table="${key}" data-key="${c[0]}">
            ${c[1]} <span class="sort">${st.key === c[0] ? (st.dir > 0 ? '▲' : '▼') : '↕'}</span>
          </th>
        `;
        }).join('') + '</tr></thead><tbody>';

        if (!data.length) {
            html += `
          <tr>
            <td colspan="${baseCols.length}" class="empty">
              No rows. Try lower MIN_FUNDING_RATE_PERCENT or switch filter to All.
            </td>
          </tr>
        `;
        }

        data.forEach(r => {
            html += `<tr class="${r.selected ? 'selected-row' : ''}">`;
            html += baseCols.map(c => cellHtml(r, c[0], c[2])).join('');
            html += '</tr>';
        });

        html += '</tbody>';

        table.innerHTML = html;

        table.querySelectorAll('th').forEach(th => {
            th.onclick = () => {
                const k = th.dataset.key;

                if (sortState[key].key === k) {
                    sortState[key].dir *= -1;
                } else {
                    sortState[key].key = k;
                    sortState[key].dir = 1;
                }

                renderAll(false);
            };
        });
    }

    function cellHtml(r, k, cls) {
        const x = r[k];
        const tdClass = cls ? ` class="${cls}"` : '';

        if (k === 'selected') {
            return `<td${tdClass}>${x ? '★' : ''}</td>`;
        }

        if (k === 'price') {
            return `<td${tdClass}>${fmtPrice(x)}</td>`;
        }

        if (k === 'funding_display') {
            return `<td${tdClass}>${fundingDisplay(r)}</td>`;
        }

        if (k === 'volume_24h_usdt') {
            return `<td${tdClass}>${money(x)}</td>`;
        }

        if (k === 'planned_entry' || k === 'safe_tp_price') {
            const value = fmtPrice(x);
            const exchange = escapeHtml(r.exchange);
            const symbol = escapeHtml(r.symbol);
            const field = escapeHtml(k);
            const numericValue = Number(x || 0);

            return `
          <td${tdClass}>
            <div class="edit-wrap">
              <span class="edit-value" title="${value}">${value}</span>
              <button
                class="edit-btn"
                title="Edit"
                onclick="editCandidateValue(event,'${exchange}','${symbol}','${field}',${numericValue})"
              >✎</button>
            </div>
          </td>
        `;
        }

        if (k === 'pass_funding' || k === 'pass_volume') {
            return `<td${tdClass}>${pass(x)}</td>`;
        }

        if (k === 'updated_at') {
            return `<td${tdClass}>${x ? new Date(x).toLocaleTimeString('ru-RU', { hour12: false }) : '—'}</td>`;
        }

        return `<td${tdClass}>${escapeHtml(x)}</td>`;
    }

    async function editCandidateValue(ev, exchange, symbol, field, currentValue) {
        ev.stopPropagation();

        const label = field === 'planned_entry' ? 'Planned Entry' : 'Safe TP';
        const raw = prompt(`Введите новое значение для ${label} (${exchange} ${symbol})`, currentValue);

        if (raw === null) return;

        const value = Number(String(raw).replace(',', '.'));

        if (!Number.isFinite(value) || value <= 0) {
            alert('Некорректное значение');
            return;
        }

        const res = await fetch('/api/candidate/override', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ exchange, symbol, field, value })
        });

        if (!res.ok) {
            alert('Ошибка сохранения: ' + await res.text());
            return;
        }

        await load(false);
    }

    function renderSimpleTable(id, rows, cols) {
        const t = document.getElementById(id);
        if (!t) return;

        let html = '<thead><tr>' + cols.map(c => '<th>' + c[1] + '</th>').join('') + '</tr></thead><tbody>';

        if (!rows?.length) {
            html += `<tr><td colspan="${cols.length}" class="empty">No rows</td></tr>`;
        }

        (rows || []).forEach(r => {
            html += '<tr>' + cols.map(c => '<td>' + escapeHtml(r[c[0]] ?? '') + '</td>').join('') + '</tr>';
        });

        html += '</tbody>';
        t.innerHTML = html;
    }

    function renderAll(rebuild = false) {
        if (!state) return;

        if (rebuild) {
            buildShell();
        }

        document.getElementById('mode').textContent = String(state.mode || '—').toUpperCase();
        document.getElementById('serverInfo').textContent = 'Status: running';

        renderExchangeGrid();

        exchanges().forEach(renderCandidateTable);

        renderSimpleTable('activeTable', state.active || [], [
            ['exchange', 'Exchange'],
            ['symbol', 'Symbol'],
            ['scenario', 'Scenario'],
            ['side', 'Side'],
            ['entry_price', 'Entry'],
            ['take_profit_price', 'TP'],
            ['unrealized_pnl', 'Unrealized PnL'],
            ['status', 'Status']
        ]);

        renderSimpleTable('journalTable', state.closed || [], [
            ['closed_at', 'Closed'],
            ['exchange', 'Exchange'],
            ['symbol', 'Symbol'],
            ['scenario', 'Scenario'],
            ['side', 'Side'],
            ['entry_price', 'Entry'],
            ['exit_price', 'Exit'],
            ['net_pnl', 'Net PnL'],
            ['close_reason', 'Reason']
        ]);

        const settings = document.getElementById('settingsBox');
        if (settings) {
            settings.textContent = JSON.stringify(state.settings || {}, null, 2);
        }

        const logs = document.getElementById('logsBox');
        if (logs) {
            logs.textContent = (state.logs || []).join('\n');
        }
    }

    async function load(rebuild = false) {
        try {
            const res = await fetch('/api/state', { cache: 'no-store' });
            const newState = await res.json();
            const first = !state;

            state = newState;

            renderAll(rebuild || first);
        } catch (e) {
            document.getElementById('serverInfo').textContent = 'Status: API error ' + e.message;
        }
    }

    function pad(n) {
        return String(n).padStart(2, '0');
    }

    function countdownToInterval(hours) {
        const nowMs = Date.now();
        const utc = new Date(nowMs);
        const h = utc.getUTCHours();
        const nextH = Math.floor(h / hours) * hours + hours;

        let next;

        if (nextH >= 24) {
            next = Date.UTC(
                utc.getUTCFullYear(),
                utc.getUTCMonth(),
                utc.getUTCDate() + 1,
                0, 0, 0
            );
        } else {
            next = Date.UTC(
                utc.getUTCFullYear(),
                utc.getUTCMonth(),
                utc.getUTCDate(),
                nextH, 0, 0
            );
        }

        let sec = Math.max(0, Math.floor((next - nowMs) / 1000));

        const hh = pad(Math.floor(sec / 3600));
        sec %= 3600;

        const mm = pad(Math.floor(sec / 60));
        const ss = pad(sec % 60);

        return `${hh}:${mm}:${ss}`;
    }

    function timers() {
        document.getElementById('clockPlus3').textContent =
            new Date().toLocaleTimeString('ru-RU', { hour12: false }) + ' UTC+3';

        document.getElementById('cd1h').textContent = countdownToInterval(1);
        document.getElementById('cd4h').textContent = countdownToInterval(4);
        document.getElementById('cd8h').textContent = countdownToInterval(8);
    }

    function confirmCloseAll() {
        if (!confirm('Подтвердить закрытие всех активных сделок по рынку?')) return;

        fetch('/api/close-all', { method: 'POST' })
            .then(r => r.text())
            .then(t => alert(t || 'Request sent'))
            .catch(e => alert(e.message));
    }

    document.getElementById('themeBtn').onclick = () => {
        const d = document.documentElement;
        const dark = d.getAttribute('data-theme') === 'dark';

        d.setAttribute('data-theme', dark ? 'light' : 'dark');
        localStorage.setItem('theme', dark ? 'light' : 'dark');
        document.getElementById('themeBtn').textContent = dark ? '🌙 Dark' : '☀️ Light';
    };

    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');

    if (localStorage.getItem('theme') === 'dark') {
        document.getElementById('themeBtn').textContent = '☀️ Light';
    }

    setInterval(timers, 1000);
    setInterval(() => load(false), 5000);

    timers();
    load(true);
</script>
</body>
</html>
