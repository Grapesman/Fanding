<!doctype html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Funding Bot Dashboard</title>

    <style>
        :root {
            --bg: #f5f5f7;
            --card: rgba(255,255,255,.86);
            --card2: #fff;
            --text: #1d1d1f;
            --muted: #6e6e73;
            --line: rgba(0,0,0,.08);
            --soft: rgba(120,120,128,.12);
            --blue: #007aff;
            --green: #34c759;
            --red: #ff3b30;
            --orange: #ff9500;
            --shadow: 0 18px 50px rgba(0,0,0,.08);
            --radius: 22px;
        }

        html[data-theme="dark"] {
            --bg: #0b0b0f;
            --card: rgba(28,28,30,.86);
            --card2: #1c1c1e;
            --text: #f5f5f7;
            --muted: #a1a1aa;
            --line: rgba(255,255,255,.10);
            --soft: rgba(120,120,128,.18);
            --shadow: 0 20px 70px rgba(0,0,0,.45);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Arial, sans-serif;
            background: radial-gradient(circle at top left, rgba(0,122,255,.10), transparent 34%), var(--bg);
            color: var(--text);
        }

        button, input, select { font: inherit; }

        .top {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(18px);
            background: color-mix(in srgb, var(--bg) 78%, transparent);
            border-bottom: 1px solid var(--line);
        }

        .header {
            display: grid;
            grid-template-columns: minmax(360px, 1fr) minmax(320px, 460px) auto;
            align-items: stretch;
            gap: 14px;
            max-width: 1560px;
            margin: 0 auto;
            padding: 12px 22px;
        }

        .brand {
            display: flex;
            gap: 12px;
            align-items: center;
            min-width: 0;
        }

        .logo {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--blue), #6e5cff);
            box-shadow: 0 10px 22px rgba(0,122,255,.28);
            flex: 0 0 auto;
        }

        h1 { font-size: 20px; margin: 0; }

        .subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-top: 2px;
        }

        .header-mode {
            height: 100%;
            min-height: 58px;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,.06);
            padding: 9px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            backdrop-filter: blur(16px);
        }

        .header-mode-left {
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 0;
        }

        .header-mode .label {
            font-size: 11px;
            line-height: 1;
        }

        .header-mode .value {
            font-size: 18px;
            font-weight: 900;
            line-height: 1;
            margin-top: 0;
            white-space: nowrap;
        }

        .header-mode .small {
            font-size: 11px;
            line-height: 1.2;
            margin-top: 0;
            text-align: right;
            max-width: 210px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: flex-end;
            flex-wrap: nowrap;
            align-self: center;
        }

        .btn {
            border: 1px solid var(--line);
            background: var(--card2);
            color: var(--text);
            padding: 9px 12px;
            border-radius: 13px;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(0,0,0,.04);
            white-space: nowrap;
        }

        .btn:hover { border-color: rgba(0,122,255,.45); }

        .btn.primary {
            background: var(--blue);
            color: #fff;
            border-color: var(--blue);
        }

        .btn.danger {
            background: var(--red);
            color: #fff;
            border-color: var(--red);
        }

        .wrap {
            max-width: 1560px;
            margin: 0 auto;
            padding: 22px;
        }

        .cards {
            display: grid;
            grid-template-columns: minmax(0, 4fr) minmax(250px, .9fr);
            gap: 14px;
            margin: 18px 0;
            align-items: stretch;
        }

        @media (max-width: 1150px) {
            .header { grid-template-columns: 1fr; }
            .header-mode { min-height: auto; }
            .header-mode .small { text-align: left; max-width: none; }
            .actions { justify-content: flex-start; flex-wrap: wrap; }
            .cards { grid-template-columns: 1fr; }
        }

        .card {
            height: 100%;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            backdrop-filter: blur(16px);
        }

        .label {
            font-size: 12px;
            color: var(--muted);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .04em;
        }

        .value {
            font-size: 24px;
            font-weight: 900;
            margin-top: 8px;
        }

        .small {
            font-size: 12px;
            color: var(--muted);
            margin-top: 6px;
        }

        .exchange-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            overflow: visible;
            padding-right: 0;
            margin-top: 12px;
        }

        @media (max-width: 1250px) {
            .exchange-grid { grid-template-columns: 1fr; }
        }

        .ex-mini {
            display: grid;
            grid-template-columns: 78px 76px 82px minmax(0, 1fr);
            align-items: center;
            gap: 7px;
            background: var(--soft);
            border: 1px solid var(--line);
            border-radius: 15px;
            padding: 8px 9px;
            min-height: 40px;
        }

        .ex-top {
            display: flex;
            align-items: center;
            gap: 7px;
            min-width: 0;
        }

        .ex-name {
            font-size: 12px;
            font-weight: 900;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--muted);
            display: inline-block;
            flex: 0 0 auto;
        }

        .dot.ok { background: var(--green); }
        .dot.no { background: var(--red); }

        .status-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: fit-content;
            min-width: 70px;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: .2px;
            white-space: nowrap;
        }

        .status-pill.ok {
            color: #0f7a3b;
            background: rgba(52,199,89,.16);
            border: 1px solid rgba(52,199,89,.35);
        }

        .status-pill.warn {
            color: #a05a00;
            background: rgba(255,149,0,.16);
            border: 1px solid rgba(255,149,0,.35);
        }

        .status-pill.no {
            color: #b42318;
            background: rgba(255,59,48,.14);
            border: 1px solid rgba(255,59,48,.35);
        }

        .ex-bal {
            font-size: 10px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ex-bal strong {
            display: block;
            font-size: 12px;
            color: var(--text);
            line-height: 1.1;
        }

        .ex-err {
            font-size: 10px;
            color: var(--red);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-top: 2px;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-top: 12px;
        }

        .timer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--soft);
            border-radius: 14px;
            padding: 9px 11px;
        }

        .timer-row span {
            font-size: 12px;
            color: var(--muted);
            font-weight: 900;
        }

        .timer-row strong {
            font-size: 17px;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }

        .tabs {
            display: flex;
            gap: 8px;
            overflow: auto;
            padding-bottom: 8px;
            scrollbar-width: thin;
        }

        .tab {
            white-space: nowrap;
            border: 1px solid var(--line);
            background: var(--card);
            color: var(--text);
            padding: 10px 13px;
            border-radius: 999px;
            cursor: pointer;
        }

        .tab.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        .section {
            display: none;
            margin-top: 12px;
        }

        .section.active { display: block; }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 14px 0;
            flex-wrap: wrap;
        }

        .toolbar h2 {
            margin: 0;
            font-size: 22px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .control {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 8px 10px;
            display: flex;
            gap: 8px;
            align-items: center;
            color: var(--muted);
            font-size: 13px;
        }

        .control input,
        .control select {
            width: 90px;
            border: 0;
            background: transparent;
            color: var(--text);
            outline: none;
            font-weight: 800;
        }

        .control input[type="search"] { width: 180px; }

        .tableWrap {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: auto;
            width: 100%;
        }

        table {
            width: 100%;
            min-width: 1160px;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .wide-table {
            min-width: 1680px;
        }

        th, td {
            padding: 12px 12px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            font-size: 13px;
            vertical-align: middle;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        th {
            position: sticky;
            top: 0;
            background: var(--card2);
            z-index: 2;
            color: var(--muted);
            font-weight: 900;
            cursor: pointer;
        }

        col.col-star { width: 54px; }
        col.col-symbol { width: 150px; }
        col.col-price { width: 115px; }
        col.col-funding { width: 125px; }
        col.col-volume { width: 180px; }
        col.col-entry { width: 150px; }
        col.col-tp { width: 150px; }
        col.col-pass { width: 130px; }
        col.col-updated { width: 115px; }

        tbody tr:hover { background: var(--soft); }

        .selected-row { background: rgba(0,122,255,.08); }

        .sort {
            font-size: 10px;
            color: var(--muted);
            margin-left: 4px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 48px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: .3px;
            line-height: 1;
        }

        .badge.ok {
            color: #0f7a3b;
            background: rgba(52,199,89,.16);
            border: 1px solid rgba(52,199,89,.35);
        }

        .badge.no {
            color: #b42318;
            background: rgba(255,59,48,.14);
            border: 1px solid rgba(255,59,48,.35);
        }

        .badge.warn {
            color: #a05a00;
            background: rgba(255,149,0,.16);
            border: 1px solid rgba(255,149,0,.35);
        }

        .mono {
            font-variant-numeric: tabular-nums;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        }

        .editable-cell {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 24px;
            align-items: center;
            gap: 8px;
            max-width: 124px;
        }

        .editable-value {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
            font-weight: 700;
        }

        .edit-btn {
            width: 22px;
            height: 22px;
            border: 0;
            border-radius: 8px;
            background: rgba(0,122,255,.12);
            color: var(--blue);
            cursor: pointer;
            font-size: 12px;
            line-height: 22px;
            padding: 0;
            text-align: center;
        }

        .edit-btn:hover { background: rgba(0,122,255,.20); }

        .empty {
            color: var(--muted);
            text-align: center;
            padding: 32px;
        }

        .logbox, pre {
            white-space: pre-wrap;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            color: var(--text);
            overflow: auto;
        }

        .muted { color: var(--muted); }
    </style>
</head>

<body>
<div class="top">
    <div class="header">
        <div class="brand">
            <div class="logo"></div>
            <div>
                <h1>Funding Bot</h1>
                <div class="subtitle">Mainnet-only · funding live-ready execution · 3 scenarios</div>
            </div>
        </div>

        <div class="header-mode">
            <div class="header-mode-left">
                <div class="label">Bot Mode</div>
                <div class="value" id="mode">—</div>
            </div>
            <div class="small" id="serverInfo">Status: loading</div>
        </div>

        <div class="actions">
            <button class="btn" id="themeBtn">🌙 Dark</button>
            <button class="btn" onclick="load()">↻ Refresh</button>
            <button class="btn primary" onclick="confirmCloseAll()">Close all</button>
        </div>
    </div>
</div>

<div class="wrap">
    <div class="cards">
        <div class="card">
            <div class="label">Exchanges</div>
            <div class="exchange-grid" id="exchangeGrid"></div>
        </div>

        <div class="card">
            <div class="label">Funding Countdowns</div>
            <div class="timer-grid">
                <div class="timer-row">
                    <span>UTC+3</span>
                    <strong id="clockPlus3">--:--:--</strong>
                </div>
                <div class="timer-row">
                    <span>1h</span>
                    <strong id="cd1h">--:--:--</strong>
                </div>
                <div class="timer-row">
                    <span>4h</span>
                    <strong id="cd4h">--:--:--</strong>
                </div>
                <div class="timer-row">
                    <span>8h</span>
                    <strong id="cd8h">--:--:--</strong>
                </div>
            </div>
        </div>
    </div>

    <nav class="tabs" id="tabs"></nav>
    <div id="sections"></div>
</div>

<script>
    let state = null;
    let sortState = {};

    const baseCols = [
        ['selected', '★'],
        ['symbol', 'Symbol'],
        ['price', 'Price'],
        ['funding_display', 'Funding'],
        ['volume_24h_usdt', '24h Volume'],
        ['planned_entry', 'Planned Entry'],
        ['safe_tp_price', 'Safe TP'],
        ['pass_funding', 'Pass Funding'],
        ['pass_volume', 'Pass Volume'],
        ['updated_at', 'Updated']
    ];

    function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"]/g, m => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;'
        }[m]));
    }

    function fmtNum(n, d = 2) {
        if (n === undefined || n === null || Number.isNaN(Number(n))) return '—';
        return Number(n).toLocaleString(undefined, { maximumFractionDigits: d });
    }

    function money(n, d = 2) {
        if (n === undefined || n === null || Number.isNaN(Number(n))) return '—';
        return Number(n).toFixed(d) + ' USDT';
    }

    function signedMoney(n, d = 4) {
        n = Number(n || 0);
        return (n >= 0 ? '+' : '') + n.toFixed(d) + ' USDT';
    }

    function pct2(x) {
        const n = Number(x || 0) * 100;
        return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
    }

    function fmtPrice(n) {
        n = Number(n || 0);
        if (!n) return '—';
        if (n >= 100) return n.toFixed(2);
        if (n >= 1) return n.toFixed(4);
        return n.toFixed(8).replace(/0+$/, '').replace(/\.$/, '');
    }

    function fmtPriceShort(n) {
        n = Number(n || 0);
        if (!n) return '—';
        return n.toFixed(3);
    }

    function fmtPriceFull(n) {
        n = Number(n || 0);
        if (!n) return '—';
        if (n >= 100) return n.toFixed(6);
        if (n >= 1) return n.toFixed(8);
        return n.toFixed(12).replace(/0+$/, '').replace(/\.$/, '');
    }

    function pass(x) {
        return x
            ? '<span class="badge ok">YES</span>'
            : '<span class="badge no">NO</span>';
    }

    function statusBadge(s) {
        const v = String(s || '—');
        const low = v.toLowerCase();

        if (low.includes('closed') || low.includes('finish')) return `<span class="badge ok">${escapeHtml(v)}</span>`;
        if (low.includes('error') || low.includes('failed')) return `<span class="badge no">${escapeHtml(v)}</span>`;
        if (low.includes('alert') || low.includes('stuck')) return `<span class="badge warn">${escapeHtml(v)}</span>`;

        return `<span class="badge">${escapeHtml(v)}</span>`;
    }

    function scenarioBadge(s) {
        const v = String(s || '—');
        if (v.includes('1')) return `<span class="badge ok">${escapeHtml(v)}</span>`;
        if (v.includes('2')) return `<span class="badge warn">${escapeHtml(v)}</span>`;
        if (v.includes('3')) return `<span class="badge no">${escapeHtml(v)}</span>`;
        return `<span class="badge">${escapeHtml(v)}</span>`;
    }

    function fundingDisplay(r) {
        const h = Number(r.funding_interval_hours || 8);
        return pct2(r.funding_rate) + ' / ' + h.toFixed(0) + 'h';
    }

    function exchangeKey(name) {
        return String(name || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function exchanges() {
        return state?.exchanges || [];
    }

    function symbolOf(r) {
        return r.native_symbol || r.symbol || '—';
    }

    function utc3(t) {
        if (!t) return '—';
        const d = new Date(t);
        if (Number.isNaN(d.getTime())) return '—';
        return d.toLocaleString('ru-RU', { hour12: false }) + ' UTC+3';
    }

    function buildShell() {
        const tabs = document.getElementById('tabs');
        const sections = document.getElementById('sections');

        tabs.innerHTML = '';
        sections.innerHTML = '';

        const items = [
            ...exchanges().map(ex => ({
                key: exchangeKey(ex.name),
                label: ex.name + ' Futures',
                exchange: ex.name
            })),
            { key: 'planned', label: 'Planned Trades' },
            { key: 'active', label: 'Active Trades' },
            { key: 'journal', label: 'Trade Journal' },
            { key: 'settings', label: 'Settings / Info' },
            { key: 'logs', label: 'Logs' }
        ];

        items.forEach((e, i) => {
            if (!sortState[e.key]) sortState[e.key] = { key: 'funding_rate', dir: -1 };

            const b = document.createElement('button');
            b.className = 'tab' + (i === 0 ? ' active' : '');
            b.textContent = e.label;
            b.dataset.tab = e.key;
            b.onclick = () => showTab(e.key);
            tabs.appendChild(b);

            const sec = document.createElement('section');
            sec.className = 'section' + (i === 0 ? ' active' : '');
            sec.id = 'tab-' + e.key;

            if (e.exchange) {
                sec.innerHTML = exchangeSectionHtml(e);
            } else if (e.key === 'planned') {
                sec.innerHTML = '<div class="toolbar"><h2>Planned Trades</h2></div><div class="tableWrap"><table class="wide-table" id="plannedTable"></table></div>';
            } else if (e.key === 'active') {
                sec.innerHTML = '<div class="toolbar"><h2>Active Trades</h2></div><div class="tableWrap"><table class="wide-table" id="activeTable"></table></div>';
            } else if (e.key === 'journal') {
                sec.innerHTML = '<div class="toolbar"><h2>Trade Journal</h2></div><div class="tableWrap"><table class="wide-table" id="journalTable"></table></div>';
            } else if (e.key === 'settings') {
                sec.innerHTML = '<div class="toolbar"><h2>Settings / Info</h2></div><pre id="settingsBox">Loading…</pre>';
            } else {
                sec.innerHTML = '<div class="toolbar"><h2>Logs</h2></div><div class="logbox" id="logsBox">Loading…</div>';
            }

            sections.appendChild(sec);
        });
    }

    function exchangeSectionHtml(e) {
        return `
      <div class="toolbar">
        <h2>${escapeHtml(e.label)}</h2>
        <div class="controls">
          <label class="control">
            Show rows
            <input id="${e.key}Rows" type="number" min="1" value="10" oninput="renderAll(false)">
          </label>
          <label class="control">
            Search
            <input id="${e.key}Search" type="search" placeholder="BTC, ETH…" oninput="renderAll(false)">
          </label>
          <label class="control">
            Filter
            <select id="${e.key}Filter" onchange="renderAll(false)">
              <option value="all" selected>All</option>
              <option value="passed">Passed only</option>
              <option value="selected">Selected</option>
            </select>
          </label>
        </div>
      </div>
      <div class="tableWrap">
        <table id="${e.key}Table">
          <colgroup>
            <col class="col-star">
            <col class="col-symbol">
            <col class="col-price">
            <col class="col-funding">
            <col class="col-volume">
            <col class="col-entry">
            <col class="col-tp">
            <col class="col-pass">
            <col class="col-pass">
            <col class="col-updated">
          </colgroup>
        </table>
      </div>
    `;
    }

    function showTab(key) {
        document.querySelectorAll('.tab').forEach(x => {
            x.classList.toggle('active', x.dataset.tab === key);
        });

        document.querySelectorAll('.section').forEach(x => {
            x.classList.toggle('active', x.id === 'tab-' + key);
        });
    }

    function renderExchangeGrid() {
        const grid = document.getElementById('exchangeGrid');

        grid.innerHTML = exchanges().map(ex => {
            const connected = !!ex.connected || !!ex.public_ok;
            const privateOK = !!ex.private_ok;
            const bal = ex.balance || {};
            const balance = Number(bal.available_usdt || bal.wallet_usdt || 0);

            const dotCls = connected ? 'ok' : 'no';
            const publicText = connected ? 'Public OK' : 'No public';
            const privateText = privateOK ? 'Balance OK' : 'No balance';
            const privateCls = privateOK ? 'ok' : 'warn';

            return `
        <div class="ex-mini" title="${escapeHtml(ex.error || '')}">
          <div class="ex-top">
            <span class="dot ${dotCls}"></span>
            <span class="ex-name">${escapeHtml(ex.name)}</span>
          </div>

          <span class="status-pill ${dotCls}">${publicText}</span>
          <span class="status-pill ${privateCls}">${privateText}</span>

          <div class="ex-bal">
            Futures
            <strong>${Number.isFinite(balance) ? balance.toFixed(2) + ' USDT' : '—'}</strong>
            ${ex.error ? `<div class="ex-err">${escapeHtml(ex.error)}</div>` : ''}
          </div>
        </div>
      `;
        }).join('');
    }

    function val(row, key) {
        return key === 'funding_display' ? Number(row.funding_rate || 0) : row[key];
    }

    function renderCandidateTable(ex) {
        const key = exchangeKey(ex.name);
        const rows = ex.candidates || [];
        const table = document.getElementById(key + 'Table');

        if (!table) return;

        let limit = parseInt(document.getElementById(key + 'Rows')?.value || '10', 10);
        if (limit < 1) limit = 10;

        const q = String(document.getElementById(key + 'Search')?.value || '').trim().toUpperCase();
        const filter = document.getElementById(key + 'Filter')?.value || 'all';
        const st = sortState[key] || { key: 'funding_rate', dir: -1 };

        let data = [...rows];

        if (q) data = data.filter(r => String(r.symbol || '').toUpperCase().includes(q));

        if (filter === 'passed') {
            data = data.filter(r =>
                r.pass_funding === true &&
                r.pass_volume === true &&
                r.pass_spread !== false
            );
        }

        if (filter === 'selected') {
            data = data.filter(r => r.selected === true);
        }

        data = data.sort((a, b) => {
            let av = val(a, st.key);
            let bv = val(b, st.key);

            if (typeof av === 'string') return String(av).localeCompare(String(bv)) * st.dir;

            return ((Number(av) || 0) - (Number(bv) || 0)) * st.dir;
        }).slice(0, limit);

        let html = `
      <colgroup>
        <col class="col-star">
        <col class="col-symbol">
        <col class="col-price">
        <col class="col-funding">
        <col class="col-volume">
        <col class="col-entry">
        <col class="col-tp">
        <col class="col-pass">
        <col class="col-pass">
        <col class="col-updated">
      </colgroup>
    `;

        html += '<thead><tr>' + baseCols.map(c => {
            return `
        <th data-table="${key}" data-key="${c[0]}">
          ${c[1]} <span class="sort">${st.key === c[0] ? (st.dir > 0 ? '▲' : '▼') : '↕'}</span>
        </th>
      `;
        }).join('') + '</tr></thead><tbody>';

        if (!data.length) {
            html += `<tr><td colspan="${baseCols.length}" class="empty">No rows. Try lower MIN_FUNDING_RATE_PERCENT or switch filter to All.</td></tr>`;
        }

        data.forEach(r => {
            html += `<tr class="${r.selected ? 'selected-row' : ''}">`;
            html += baseCols.map(c => cellHtml(r, c[0])).join('');
            html += '</tr>';
        });

        html += '</tbody>';
        table.innerHTML = html;

        table.querySelectorAll('th').forEach(th => {
            th.onclick = () => {
                const k = th.dataset.key;

                if (sortState[key].key === k) {
                    sortState[key].dir *= -1;
                } else {
                    sortState[key].key = k;
                    sortState[key].dir = 1;
                }

                renderAll(false);
            };
        });
    }

    function cellHtml(r, k) {
        const x = r[k];

        if (k === 'selected') return '<td>' + (x ? '★' : '') + '</td>';
        if (k === 'price') return '<td>' + fmtPrice(x) + '</td>';
        if (k === 'funding_display') return '<td>' + fundingDisplay(r) + '</td>';
        if (k === 'volume_24h_usdt') return '<td>' + money(x) + '</td>';

        if (k === 'planned_entry' || k === 'safe_tp_price') {
            const shortValue = fmtPriceShort(x);
            const fullValue = fmtPriceFull(x);

            return `
        <td>
          <div class="editable-cell">
            <span class="editable-value" title="${fullValue}">${shortValue}</span>
            <button
              class="edit-btn"
              title="Full price: ${fullValue}"
              onclick="editCandidateValue(event,'${escapeHtml(r.exchange)}','${escapeHtml(r.symbol)}','${k}',${Number(x || 0)})"
            >✎</button>
          </div>
        </td>
      `;
        }

        if (k === 'pass_funding' || k === 'pass_volume') return '<td>' + pass(x) + '</td>';
        if (k === 'updated_at') return '<td>' + (x ? new Date(x).toLocaleTimeString('ru-RU', { hour12: false }) : '—') + '</td>';

        return '<td>' + escapeHtml(x) + '</td>';
    }

    async function editCandidateValue(ev, exchange, symbol, field, currentValue) {
        ev.stopPropagation();

        const label = field === 'planned_entry' ? 'Planned Entry' : 'Safe TP';
        const raw = prompt(`Введите новое значение для ${label} (${exchange} ${symbol})`, fmtPriceFull(currentValue));

        if (raw === null) return;

        const value = Number(String(raw).replace(',', '.'));

        if (!Number.isFinite(value) || value <= 0) {
            alert('Некорректное значение');
            return;
        }

        const res = await fetch('/api/candidate/override', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ exchange, symbol, field, value })
        });

        if (!res.ok) {
            alert('Ошибка сохранения: ' + await res.text());
            return;
        }

        await load(false);
    }

    function renderPlannedTable() {
        const rows = state?.planned || [];
        const table = document.getElementById('plannedTable');
        if (!table) return;

        const cols = [
            ['exchange', 'Exchange'],
            ['symbol', 'Symbol'],
            ['status', 'Status'],
            ['funding_rate', 'Funding'],
            ['funding_time', 'Funding Time'],
            ['position_usdt', 'Size'],
            ['fair_price', 'Fair Price'],
            ['scenario_2_tp_price', 'S2 TP'],
            ['scenario_3_buy_price', 'S3 Buy'],
            ['scenario_3_sell_price', 'S3 Sell'],
            ['estimated_qty', 'Est Qty'],
            ['can_trade_live', 'Live OK'],
            ['live_reject_reason', 'Reject Reason']
        ];

        let html = '<thead><tr>' + cols.map(c => `<th>${c[1]}</th>`).join('') + '</tr></thead><tbody>';

        if (!rows.length) {
            html += `<tr><td colspan="${cols.length}" class="empty">No planned trades</td></tr>`;
        }

        rows.forEach(r => {
            html += '<tr>';
            html += `<td>${escapeHtml(r.exchange)}</td>`;
            html += `<td title="${escapeHtml(symbolOf(r))}">${escapeHtml(symbolOf(r))}</td>`;
            html += `<td>${statusBadge(r.status)}</td>`;
            html += `<td>${pct2(r.funding_rate)} / ${Number(r.funding_interval_hours || 8).toFixed(0)}h</td>`;
            html += `<td>${utc3(r.funding_time)}</td>`;
            html += `<td>${money(r.position_usdt)}</td>`;
            html += `<td class="mono">${fmtPriceFull(r.fair_price)}</td>`;
            html += `<td class="mono">${fmtPriceFull(r.scenario_2_tp_price)}</td>`;
            html += `<td class="mono">${fmtPriceFull(r.scenario_3_buy_price)}</td>`;
            html += `<td class="mono">${fmtPriceFull(r.scenario_3_sell_price)}</td>`;
            html += `<td class="mono">${fmtNum(r.estimated_qty, 8)}</td>`;
            html += `<td>${pass(r.can_trade_live)}</td>`;
            html += `<td title="${escapeHtml(r.live_reject_reason || '')}">${escapeHtml(r.live_reject_reason || '')}</td>`;
            html += '</tr>';
        });

        html += '</tbody>';
        table.innerHTML = html;
    }

    function renderActiveTable() {
        const rows = state?.active || [];
        const table = document.getElementById('activeTable');
        if (!table) return;

        const cols = [
            'Exchange', 'Symbol', 'Scenario', 'Status', 'Side', 'Funding',
            'Funding Time', 'Size', 'Entry', 'Current', 'TP', 'Qty',
            'Unrealized PnL', 'Funding Fee', 'Commission', 'Manual Close'
        ];

        let html = '<thead><tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';

        if (!rows.length) {
            html += `<tr><td colspan="${cols.length}" class="empty">No active trades</td></tr>`;
        }

        rows.forEach(r => {
            const tradeID = r.trade_id || r.plan_id || '';
            const entry = r.entry_avg_price || r.entry_price || 0;
            const current = r.mark_price || r.current_price || 0;

            html += '<tr>';
            html += `<td>${escapeHtml(r.exchange)}</td>`;
            html += `<td title="${escapeHtml(symbolOf(r))}">${escapeHtml(symbolOf(r))}</td>`;
            html += `<td>${scenarioBadge(r.scenario)}</td>`;
            html += `<td>${statusBadge(r.status)}</td>`;
            html += `<td>${escapeHtml(r.side || '')}</td>`;
            html += `<td>${pct2(r.funding_rate)} / ${Number(r.funding_interval_hours || 8).toFixed(0)}h</td>`;
            html += `<td>${utc3(r.funding_time)}</td>`;
            html += `<td>${money(r.position_usdt)}</td>`;
            html += `<td class="mono">${fmtPriceFull(entry)}</td>`;
            html += `<td class="mono">${fmtPriceFull(current)}</td>`;
            html += `<td class="mono">${fmtPriceFull(r.take_profit_price)}</td>`;
            html += `<td class="mono">${fmtNum(r.qty, 8)}</td>`;
            html += `<td class="mono">${signedMoney(r.unrealized_pnl, 6)}</td>`;
            html += `<td class="mono">${signedMoney(r.funding_fee, 8)}</td>`;
            html += `<td class="mono">${money(r.commission, 8)}</td>`;
            html += `<td><button class="btn danger" onclick="manualClose('${escapeHtml(tradeID)}')">Close market</button></td>`;
            html += '</tr>';
        });

        html += '</tbody>';
        table.innerHTML = html;
    }

    function renderJournalTable() {
        const rows = state?.journal || state?.closed || [];
        const table = document.getElementById('journalTable');
        if (!table) return;

        const cols = [
            'Closed', 'Exchange', 'Symbol', 'Scenario', 'Reason', 'Side',
            'Funding', 'Entry', 'Exit', 'Qty', 'Funding Fee',
            'Commission', 'Gross PnL', 'Net PnL'
        ];

        let html = '<thead><tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';

        if (!rows.length) {
            html += `<tr><td colspan="${cols.length}" class="empty">No closed trades yet</td></tr>`;
        }

        rows.forEach(r => {
            const entry = r.entry_avg_price || r.entry_price || 0;
            const exit = r.exit_avg_price || r.exit_price || 0;

            html += '<tr>';
            html += `<td>${utc3(r.closed_at)}</td>`;
            html += `<td>${escapeHtml(r.exchange)}</td>`;
            html += `<td title="${escapeHtml(symbolOf(r))}">${escapeHtml(symbolOf(r))}</td>`;
            html += `<td>${scenarioBadge(r.scenario)}</td>`;
            html += `<td title="${escapeHtml(r.close_reason || '')}">${escapeHtml(r.close_reason || '')}</td>`;
            html += `<td>${escapeHtml(r.side || '')}</td>`;
            html += `<td>${pct2(r.funding_rate)} / ${Number(r.funding_interval_hours || 8).toFixed(0)}h</td>`;
            html += `<td class="mono">${fmtPriceFull(entry)}</td>`;
            html += `<td class="mono">${fmtPriceFull(exit)}</td>`;
            html += `<td class="mono">${fmtNum(r.qty, 8)}</td>`;
            html += `<td class="mono">${signedMoney(r.funding_fee, 8)}</td>`;
            html += `<td class="mono">${money(r.commission, 8)}</td>`;
            html += `<td class="mono">${signedMoney(r.gross_pnl, 6)}</td>`;
            html += `<td class="mono"><strong>${signedMoney(r.net_pnl, 6)}</strong></td>`;
            html += '</tr>';
        });

        html += '</tbody>';
        table.innerHTML = html;
    }

    function renderAll(rebuild = false) {
        if (!state) return;

        if (rebuild) buildShell();

        document.getElementById('mode').textContent = String(state.mode || '—').toUpperCase();
        document.getElementById('serverInfo').textContent = 'Status: running · ' + new Date().toLocaleTimeString('ru-RU', { hour12: false });

        renderExchangeGrid();
        exchanges().forEach(renderCandidateTable);

        renderPlannedTable();
        renderActiveTable();
        renderJournalTable();

        const settings = document.getElementById('settingsBox');
        if (settings) settings.textContent = JSON.stringify(state.settings || {}, null, 2);

        const logs = document.getElementById('logsBox');
        if (logs) logs.textContent = (state.logs || []).join('\n');
    }

    async function load(rebuild = false) {
        try {
            const res = await fetch('/api/state', { cache: 'no-store' });
            const newState = await res.json();
            const first = !state;

            state = newState;
            renderAll(rebuild || first);
        } catch (e) {
            document.getElementById('serverInfo').textContent = 'Status: API error ' + e.message;
        }
    }

    async function manualClose(tradeID) {
        if (!tradeID) {
            alert('trade_id is empty');
            return;
        }

        if (!confirm('Закрыть эту сделку по рынку и отменить лимитные заявки?')) return;

        const res = await fetch('/api/manual-close', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ trade_id: tradeID })
        });

        const text = await res.text();

        if (!res.ok) {
            alert('Ошибка: ' + text);
            return;
        }

        alert(text || 'Manual close request sent');
        await load(false);
    }

    function pad(n) {
        return String(n).padStart(2, '0');
    }

    function countdownToInterval(hours) {
        const nowMs = Date.now();
        const utc = new Date(nowMs);
        const h = utc.getUTCHours();
        const nextH = Math.floor(h / hours) * hours + hours;

        let next;

        if (nextH >= 24) {
            next = Date.UTC(
                utc.getUTCFullYear(),
                utc.getUTCMonth(),
                utc.getUTCDate() + 1,
                0, 0, 0
            );
        } else {
            next = Date.UTC(
                utc.getUTCFullYear(),
                utc.getUTCMonth(),
                utc.getUTCDate(),
                nextH, 0, 0
            );
        }

        let sec = Math.max(0, Math.floor((next - nowMs) / 1000));

        const hh = pad(Math.floor(sec / 3600));
        sec %= 3600;

        const mm = pad(Math.floor(sec / 60));
        const ss = pad(sec % 60);

        return `${hh}:${mm}:${ss}`;
    }

    function timers() {
        document.getElementById('clockPlus3').textContent =
            new Date().toLocaleTimeString('ru-RU', { hour12: false }) + ' UTC+3';

        document.getElementById('cd1h').textContent = countdownToInterval(1);
        document.getElementById('cd4h').textContent = countdownToInterval(4);
        document.getElementById('cd8h').textContent = countdownToInterval(8);
    }

    function confirmCloseAll() {
        if (!confirm('Подтвердить закрытие всех активных сделок по рынку?')) return;

        fetch('/api/close-all', { method: 'POST' })
            .then(r => r.text())
            .then(t => alert(t || 'Request sent'))
            .catch(e => alert(e.message));
    }

    document.getElementById('themeBtn').onclick = () => {
        const d = document.documentElement;
        const dark = d.getAttribute('data-theme') === 'dark';

        d.setAttribute('data-theme', dark ? 'light' : 'dark');
        localStorage.setItem('theme', dark ? 'light' : 'dark');
        document.getElementById('themeBtn').textContent = dark ? '🌙 Dark' : '☀️ Light';
    };

    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');

    if (localStorage.getItem('theme') === 'dark') {
        document.getElementById('themeBtn').textContent = '☀️ Light';
    }

    setInterval(timers, 1000);
    setInterval(() => load(false), 5000);

    timers();
    load(true);
</script>
